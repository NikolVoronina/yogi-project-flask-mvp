{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Admin Bookings</h1>

    {% if bookings %}
        <table border="1" cellpadding="10" cellspacing="0">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Class</th>
                <th>Date</th>
            </tr>
            {% for booking in bookings %}
            <tr>
                <td>{{ booking.id }}</td>
                <td>{{ booking.user_name }}</td>
                <td>{{ booking.class_title }}</td>
                <td>{{ booking.created_at }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No bookings found.</p>
    {% endif %}
</div>
{% endblock %}
